<!DOCTYPE html>
<html lang="en" data-theme="void">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- ── Primary Meta ── -->
    <title>ONEIROS — Dream Interpreter</title>
    <meta name="title"       content="ONEIROS — Dream Interpreter" />
    <meta name="description" content="Describe your dream. Receive a deep Jungian, Freudian & symbolic analysis powered by local AI. No cloud. No API keys. Just your unconscious." />
    <meta name="keywords"    content="dream interpreter, jungian analysis, freudian, dream symbolism, AI, local LLM, qwen" />
    <meta name="author"      content="Swapnil Hazra" />
    <meta name="theme-color" content="#04040f" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots"      content="index, follow" />

    <!-- ── Open Graph / Facebook ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="ONEIROS — Dream Interpreter" />
    <meta property="og:description" content="Describe your dream. Receive a deep Jungian, Freudian & symbolic analysis powered by local AI." />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:site_name"   content="ONEIROS" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="ONEIROS — Dream Interpreter" />
    <meta name="twitter:description" content="Describe your dream. Receive a deep Jungian, Freudian & symbolic analysis powered by local AI." />
    <meta name="twitter:creator"     content="@SwapnilHazra4" />

    <!-- ── Fonts — preconnect first, then load ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ── Favicon — inline SVG data URI, no extra file needed ── -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><radialGradient id='g' cx='40%25' cy='35%25'><stop offset='0%25' stop-color='%23a78de8'/><stop offset='100%25' stop-color='%234a2fa0'/></radialGradient></defs><circle cx='50' cy='50' r='45' fill='url(%23g)'/><text y='0.9em' x='50%25' text-anchor='middle' font-size='52' font-family='serif'>🌙</text></svg>"
    />

    <!-- ── Critical inline CSS — prevents flash of unstyled void ── -->
    <style>
      /* Lock the void background before React mounts */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        background-color: #04040f;
        color: #d4d4ee;
        min-height: 100vh;
        overflow-x: hidden;
      }

      #root {
        min-height: 100vh;
        isolation: isolate;
      }

      /* ── Pre-mount loading screen ──
         Shown while React bundle loads.
         Fades out once #root has content.  */
      #pre-mount-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #04040f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }

      #pre-mount-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .pre-loader-title {
        font-family: 'Cinzel', 'Palatino Linotype', serif;
        font-size: clamp(1.6rem, 5vw, 2.8rem);
        font-weight: 700;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        background: linear-gradient(
          135deg,
          #e8b84b 0%,
          #f0f0ff 35%,
          #c4b0f5 65%,
          #f5d98c 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 20px rgba(167, 141, 232, 0.4));
        animation: pre-loader-glow 2s ease-in-out infinite alternate;
      }

      .pre-loader-sub {
        font-family: 'Crimson Pro', Georgia, serif;
        font-style: italic;
        font-weight: 300;
        font-size: clamp(0.75rem, 2vw, 0.9rem);
        letter-spacing: 0.2em;
        color: #6e6e9a;
      }

      /* Three-dot pulse */
      .pre-loader-dots {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .pre-loader-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #7c5cbf;
        animation: dot-pulse 1.4s ease-in-out infinite both;
      }

      .pre-loader-dot:nth-child(1) { animation-delay: 0s;    }
      .pre-loader-dot:nth-child(2) { animation-delay: 0.2s;  }
      .pre-loader-dot:nth-child(3) { animation-delay: 0.4s;  }

      /* Thin progress bar at top */
      .pre-loader-bar {
        position: fixed;
        top: 0;
        left: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          #4a2fa0,
          #a78de8,
          #e8b84b,
          #a78de8,
          #4a2fa0
        );
        background-size: 200% 100%;
        animation: bar-shimmer 1.8s linear infinite;
        width: 100%;
      }

      @keyframes pre-loader-glow {
        from { filter: drop-shadow(0 0 12px rgba(167, 141, 232, 0.3)); }
        to   { filter: drop-shadow(0 0 28px rgba(167, 141, 232, 0.6)); }
      }

      @keyframes dot-pulse {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40%            { transform: scale(1.2); opacity: 1;   }
      }

      @keyframes bar-shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* No-JS fallback */
      .no-js-message {
        display: none;
        font-family: Georgia, serif;
        color: #a8a8cc;
        text-align: center;
        padding: 2rem;
        font-style: italic;
      }
    </style>

    <!-- ── noscript ── -->
    <noscript>
      <style>
        #pre-mount-loader { display: none !important; }
        .no-js-message    { display: block !important; }
      </style>
    </noscript>
  </head>

  <body>

    <!-- Pre-mount loading screen — visible before React hydrates -->
    <div id="pre-mount-loader" role="status" aria-label="Loading ONEIROS">
      <div class="pre-loader-bar"></div>
      <div class="pre-loader-title">ONEIROS</div>
      <div class="pre-loader-sub">awakening the oracle</div>
      <div class="pre-loader-dots" aria-hidden="true">
        <div class="pre-loader-dot"></div>
        <div class="pre-loader-dot"></div>
        <div class="pre-loader-dot"></div>
      </div>
    </div>

    <!-- No-JS fallback -->
    <noscript>
      <div class="no-js-message">
        ONEIROS requires JavaScript to commune with the dream realm.
        Please enable JavaScript in your browser.
      </div>
    </noscript>

    <!-- React mounts here -->
    <div id="root"></div>

    <!-- ── Dismiss pre-mount loader once React has painted ── -->
    <script>
      (function () {
        // Use MutationObserver to detect when React populates #root
        const loader = document.getElementById("pre-mount-loader");
        const root   = document.getElementById("root");

        if (!loader || !root) return;

        const observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            // React has mounted — fade out the loader
            loader.classList.add("hidden");
            observer.disconnect();

            // Remove from DOM after transition completes
            setTimeout(function () {
              loader.remove();
            }, 700);
          }
        });

        observer.observe(root, { childList: true, subtree: true });

        // Hard fallback — remove after 6s no matter what
        setTimeout(function () {
          loader.classList.add("hidden");
          setTimeout(function () { loader.remove(); }, 700);
        }, 6000);
      })();
    </script>

    <!-- ── Vite entry point ── -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
